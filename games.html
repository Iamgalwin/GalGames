<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexNerd - Games</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .games-page-container {
            padding: 120px 20px 80px;
            background-color: #faf5ed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .games-header {
            margin-bottom: 40px;
            text-align: center;
            color: #d12211;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 50px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid #ccc;
            font-size: 1.2rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-bar:focus {
            border-color: #d12211;
            box-shadow: 0 0 10px rgba(209, 34, 17, 0.2);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .game-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .game-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #eaeaea;
            /* Placeholder background */
        }

        .game-title {
            padding: 15px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #333;
        }

        .no-results {
            text-align: center;
            width: 100%;
            font-size: 1.2rem;
            color: #666;
            margin-top: 40px;
            display: none;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="brand">
            <a href="index.html"
                style="display:flex; align-items:center; gap:15px; text-decoration:none; color:inherit;">
                <img src="assets/logo.png" alt="NexNerd Logo" class="logo">
                <span class="brand-name">NexNerd</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="games.html">Games</a>
            <a href="setup.html">Setup</a>
            <a href="hello.html">Recommendation</a>
        </nav>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </header>

    <div class="games-page-container">
        <h2 class="games-header">
            <span class="script-text">G</span><span class="serif-text">AMES</span>
        </h2>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search games...">
            <p style="text-align: center; margin-top: 20px; color: #555; font-size: 1.1rem;">This is the list of games I
                have played so far and there is long way to go - have fun scrolling😊</p>
        </div>

        <div class="games-grid reveal" id="gamesGrid">
            <!-- Games will be populated here via JavaScript -->
        </div>
        <div class="no-results" id="noResults">No games matching your search were found.</div>
    </div>

    <button class="back-to-top-btn" id="backToTopBtn" aria-label="Back to Top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
    </button>

    <script>
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileSideMenu = document.getElementById('mobileSideMenu');
        const closeMobileMenuBtn = document.getElementById('closeMobileMenuBtn');
        const backToTopBtn = document.getElementById('backToTopBtn');

        if (mobileMenuBtn && mobileSideMenu && closeMobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileSideMenu.classList.add('open');
            });

            closeMobileMenuBtn.addEventListener('click', () => {
                mobileSideMenu.classList.remove('open');
            });
        }

        if (backToTopBtn) {
            const toggleBackToTop = () => {
                if (window.scrollY > 300 && window.innerWidth <= 768) {
                    backToTopBtn.classList.add('show');
                } else {
                    backToTopBtn.classList.remove('show');
                }
            };

            window.addEventListener('scroll', toggleBackToTop);
            window.addEventListener('resize', toggleBackToTop);

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        // DEVELOPER NOTE:
        // You can add your games to this list! Just upload the images to the "assets/games/" folder,
        // and add a new entry below inside the gamesData array following the same format.
        const gamesData = [
            { name: "Assassin's Creed Chronicles: India", image: "assets/games/AC-india.webp" },
            { name: "Assassin's Creed Revelations", image: "assets/games/AC-revelation.webp" },
            { name: "Assassin's Creed Chronicles: Russia", image: "assets/games/AC-russia.webp" },
            { name: "Assassin's Creed", image: "assets/games/AC1.jpg" },
            { name: "Assassin's Creed II", image: "assets/games/AC2.jpg" },
            { name: "Assassin's Creed III", image: "assets/games/AC3.webp" },
            { name: "Assassin's Creed IV: Black Flag", image: "assets/games/AC_blackflag.jpg" },
            { name: "Assassin's Creed Brotherhood", image: "assets/games/AC_brotherhood.webp" },
            { name: "Assassin's Creed Chronicles: China", image: "assets/games/AC_china.webp" },
            { name: "Assassin's Creed Rogue", image: "assets/games/AC_rogue.jpg" },
            { name: "God of War", image: "assets/games/God-of-War1.webp" },
            { name: "God of War II", image: "assets/games/God-of-War2.webp" },
            { name: "God of War: Chains of Olympus", image: "assets/games/God_of_War_Chains_of_Olympus.webp" },
            { name: "God of War: Ghost of Sparta", image: "assets/games/God_of_War_ghost_of_sparta.jpg" },
            { name: "Batman: Arkham Asylum", image: "assets/games/batman-arkham-asylum.jpg" },
            { name: "Batman: Arkham City", image: "assets/games/batman-arkham-city.jpg" },
            { name: "Batman: Arkham Origins", image: "assets/games/batman-arkham-origins.jpg" },
            { name: "Batman: Arkham Knight", image: "assets/games/batmanKN.jpg" },
            { name: "Hollow Knight", image: "assets/games/hollow-knight.jpg" },
            { name: "Inside", image: "assets/games/inside.jpg" },
            { name: "Limbo", image: "assets/games/limbo.jpg" },
            { name: "Little Nightmares", image: "assets/games/little-nightmare1.jpg" },
            { name: "Little Nightmares II", image: "assets/games/little-nightmare2.jpg" },
            { name: "Ori and the Blind Forest", image: "assets/games/ori-and-the-blind-forest.jpg" },
            { name: "Ori and the Will of the Wisps", image: "assets/games/ori-and-the-will-of-wisps.jpg" },
            { name: "Spider-Man: Shattered Dimensions", image: "assets/games/spiderman-SD.jpg" },
            { name: "Batman: Arkham Origins Blackgate", image: "assets/games/BatmanArkhamB.webp" },
            { name: "Tomb Raider", image: "assets/games/TombRaider.jpg" },
            { name: "Rise of the Tomb Raider", image: "assets/games/RiseofTR.jpg" },
            { name: "Shadow of the Tomb Raider", image: "assets/games/ShadowofTR.jpg" },
            { name: "A Plague Tale: Innocence", image: "assets/games/PlagueTale.jpg" },
            { name: "Prince of Persia: The Sands of Time", image: "assets/games/PopSot.webp" },
            { name: "Prince of Persia: Warrior Within", image: "assets/games/PopWW.webp" },
            { name: "Prince of Persia: The Two Thrones", image: "assets/games/PopTT.webp" },
            { name: "Prince of Persia: The Forgotten Sands", image: "assets/games/PopFS.webp" },
            { name: "Little Orpheus", image: "assets/games/LittleOrpheus.jpg" },
            { name: "Furi", image: "assets/games/Furi.jpg" },
            { name: "Cuphead", image: "assets/games/Cuphead.jpg" },
            { name: "Dark Souls: Remastered", image: "assets/games/DarkSouls.jpg" },
            { name: "Brothers: A Tale of Two Sons", image: "assets/games/Brothers.webp" },
            { name: "The Pathless", image: "assets/games/Pathless.webp" },
            { name: "Stray", image: "assets/games/Stray.webp" },
            { name: "Sleeping Dogs", image: "assets/games/SleepingDogs.webp" },
            { name: "Watch Dogs", image: "assets/games/WatchDogs.webp" },
            { name: "Mad Max", image: "assets/games/MadMax.webp" },
            { name: "Never Alone: Kisima Ingitchuna", image: "assets/games/NeverAlone.webp" },
            { name: "Red Dead Redemption", image: "assets/games/RDR.jpg" },
            { name: "The Stanley Parable", image: "assets/games/Stanley.jpg" },
            { name: "Jotun: Valhalla Edition", image: "assets/games/Jotun.webp" },
            { name: "Titan Souls", image: "assets/games/TitanSouls.webp" },
            { name: "Death's Door", image: "assets/games/DeathsDoor.jpg" },
            { name: "Unravel", image: "assets/games/Unravel.jpg" },
            { name: "Firewatch", image: "assets/games/Firewatch.webp" },
            { name: "Cocoon", image: "assets/games/Cocoon.jpg" },
            { name: "Gorogoa", image: "assets/games/Gorogoa.jpg" },
            { name: "Journey", image: "assets/games/Journey.webp" },
            { name: "Solar Ash", image: "assets/games/SolarAsh.jpg" },
            { name: "Hitman: Absolution", image: "assets/games/HitmanAbsolution.webp" },
            { name: "Dispatch", image: "assets/games/Dispatch.jpg" },
            { name: "Prototype", image: "assets/games/Prototype.jpg" }

        ];

        const gamesGrid = document.getElementById('gamesGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        // Function to render games
        function renderGames(gamesList) {
            gamesGrid.innerHTML = ''; // Clear current grid

            if (gamesList.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';

                gamesList.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';

                    const img = document.createElement('img');
                    img.src = game.image;
                    img.alt = game.name;
                    // Provide a fallback in case image doesn't exist yet
                    img.onerror = function () {
                        this.src = `https://via.placeholder.com/300x400/cccccc/666666?text=${encodeURIComponent(game.name)}`;
                    };

                    const title = document.createElement('div');
                    title.className = 'game-title';
                    title.textContent = game.name;

                    card.appendChild(img);
                    card.appendChild(title);
                    gamesGrid.appendChild(card);
                });
            }
        }

        // Initial render (sort alphabetically first)
        const sortedGames = [...gamesData].sort((a, b) => a.name.localeCompare(b.name));
        renderGames(sortedGames);

        // Search functionality
        searchInput.addEventListener('input', function (e) {
            // Remove special characters and normalise spaces to make search more forgiving
            const query = e.target.value.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();

            const filteredGames = sortedGames.filter(game => {
                const normalizedName = game.name.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ');
                // Allows searching by words in between
                return normalizedName.includes(query);
            });

            renderGames(filteredGames);
        });

        // Scroll Reveal Animation
        function reveal() {
            var reveals = document.querySelectorAll('.reveal');
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 100;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add('active');
                }
            }
        }
        window.addEventListener('scroll', reveal);
        reveal();
    </script>
</body>

</html>
